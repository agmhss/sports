<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>விளையாட்டுத் துறை - அண்ணா அரசு மாதிரி மேல்நிலைப் பள்ளி</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pavanam&display=swap');

        :root {
            --primary-color: #0047AB; 
            --wood-frame: #4e342e;
            --paper-bg: #ffffff;
            --board-bg: #f5f5f5;
        }

        body {
            background: #dcdcdc;
            font-family: 'Pavanam', sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .whiteboard {
            background-color: var(--board-bg);
            width: 100%;
            max-width: 1100px;
            min-height: 90vh;
            border: 12px solid var(--wood-frame);
            border-radius: 8px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            padding: 40px;
            position: relative;
            box-sizing: border-box;
        }

        .home-btn {
            position: absolute; top: 15px; left: 15px;
            background: var(--primary-color); color: white;
            text-decoration: none; padding: 8px 18px;
            border-radius: 4px; font-weight: bold; font-size: 0.9rem; z-index: 10;
        }

        header { text-align: center; border-bottom: 2px solid #ddd; margin-bottom: 30px; padding-bottom: 10px; }
        header h1 { color: var(--primary-color); margin: 0; font-size: 1.8rem; }
        header h2 { color: #555; margin: 5px 0; font-size: 1.2rem; }

        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .paper-note {
            background: var(--paper-bg);
            padding: 20px;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.1);
            border-top: 5px solid var(--primary-color);
            position: relative;
        }

        .full-width-note { grid-column: 1 / -1; }

        h3 { color: var(--primary-color); border-bottom: 1px solid #eee; padding-bottom: 5px; margin-top: 0; }
        
        /* Scoreboard */
        .scoreboard-container {
            display: flex; justify-content: space-around; flex-wrap: wrap; margin-top: 20px;
        }
        .house-card {
            text-align: center; padding: 15px; border-radius: 8px; width: 130px; margin: 10px;
            background: #fff; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border: 3px solid #ccc;
        }
        
        .house-குறிஞ்சி { border-color: #4CAF50; color: #4CAF50; }
        .house-முல்லை { border-color: #2196F3; color: #2196F3; }
        .house-மருதம் { border-color: #795548; color: #795548; }
        .house-நெய்தல் { border-color: #009688; color: #009688; }
        .house-பாலை { border-color: #FF9800; color: #FF9800; }

        .house-points { font-size: 2.2rem; font-weight: bold; color: #333; display: block; }
        
        .poster-img { width: 100%; max-height: 450px; object-fit: contain; border-radius: 4px; margin-top: 10px; }
        
        .link-item { display: block; margin: 8px 0; color: #0047AB; text-decoration: none; font-weight: bold; }
        .link-item:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="whiteboard">
    <a href="index.html" class="home-btn">🏠 முகப்பு</a>

    <header>
        <h1>அண்ணா அரசு மாதிரி மேல்நிலைப் பள்ளி, பட்டீஸ்வரம்</h1>
        <h2>விளையாட்டுத் துறை (Sports Department)</h2>
    </header>

    <div class="content-grid">
        <div class="paper-note full-width-note" style="background-color: #fffdf0; border-top-color: #FFD700;">
            <h3 style="color: #b8860b; text-align: center;">🏆 இல்லங்களின் புள்ளிப்பட்டியல் (Live Scoreboard) 🏆</h3>
            <div id="scoreboard-container" class="scoreboard-container">
                <p>புள்ளிகள் ஏற்றப்படுகின்றன...</p>
            </div>
        </div>
    </div>

    <div class="content-grid" id="main-board"></div>

</div>

<script>
    const webContentURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTvUa-lafFet8lATvvxw5UIJwI0uQ4B_s2YCd9FyAycBRGjgx_iIDmcDSPx76Vbe-SQH0gvNhOFJcrO/pub?gid=0&single=true&output=csv";
    const scoreboardURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTvUa-lafFet8lATvvxw5UIJwI0uQ4B_s2YCd9FyAycBRGjgx_iIDmcDSPx76Vbe-SQH0gvNhOFJcrO/pub?gid=866796290&single=true&output=csv";

    function parseCSV(data) {
        return data.split(/\r?\n/).filter(row => row.trim() !== "").map(row => 
            row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(col => col.replace(/^"|"$/g, "").trim())
        );
    }
    
    // FIX: Corrected Google Drive Image logic
    function getRobustImageUrl(url) {
        if (!url) return "";
        const idMatch = url.match(/[-\w]{25,}/);
        if (idMatch) {
            // Use the standard direct export link
            return `https://docs.google.com/uc?export=view&id=${idMatch[0]}`;
        }
        return url; 
    }

    // 1. LIVE SCOREBOARD LOGIC
    async function loadScoreboard() {
        try {
            const res = await fetch(scoreboardURL);
            const text = await res.text();
            const rows = parseCSV(text);
            const container = document.getElementById('scoreboard-container');
            container.innerHTML = '';

            // Skip header row, loop through houses
            rows.slice(1).forEach(cols => {
                if (!cols[0]) return;
                const name = cols[0].trim();
                const pts = cols[1] || "0";
                
                container.innerHTML += `
                    <div class="house-card house-${name}">
                        <h4 style="margin:0">${name}</h4>
                        <span class="house-points">${pts}</span>
                        <small style="color:#666">புள்ளிகள்</small>
                    </div>`;
            });
        } catch (e) { console.error("Scoreboard Error", e); }
    }

    // 2. MAIN CONTENT & POSTER LOGIC
    async function loadWebContent() {
        try {
            const res = await fetch(webContentURL);
            const text = await res.text();
            const rows = parseCSV(text);
            const board = document.getElementById('main-board');
            board.innerHTML = '';

            rows.forEach(cols => {
                if (cols.length < 2 || !cols[0]) return;
                
                const category = cols[0].trim().toLowerCase(); 
                const content = cols[1].trim();
                const subtext = cols[2] ? cols[2].trim() : '';

                if (category === "vision" || category === "mission" || category === "announcement") {
                    const title = category === "vision" ? "நோக்கம்" : (category === "mission" ? "செயல்பாடுகள்" : "அறிவிப்பு");
                    board.innerHTML += `<div class="paper-note"><h3>${title}</h3><p>${content}</p></div>`;
                } 
                // FIX: Poster Rendering
                else if (category === "poster") {
                    const finalSrc = getRobustImageUrl(subtext);
                    board.innerHTML += `
                        <div class="paper-note" style="text-align:center;">
                            <h3>${content}</h3>
                            <img src="${finalSrc}" class="poster-img" alt="Poster" 
                                 onerror="this.onerror=null; this.src='https://via.placeholder.com/400x300?text=Check+Drive+Sharing+Settings';">
                        </div>`;
                }
                else if (category === "link") {
                    let linkBox = document.getElementById('link-box');
                    if (!linkBox) {
                        board.innerHTML += `<div class="paper-note" id="link-box"><h3>முக்கிய இணைப்புகள்</h3><div id="link-list"></div></div>`;
                    }
                    document.getElementById('link-list').innerHTML += `<a href="${subtext}" target="_blank" class="link-item">🔗 ${content}</a>`;
                }
            });
        } catch (e) { console.error("Content Error", e); }
    }

    loadScoreboard();
    loadWebContent();
</script>

</body>
</html>
