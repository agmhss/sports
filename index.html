<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>விளையாட்டுத் துறை - அண்ணா அரசு மாதிரி மேல்நிலைப் பள்ளி</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pavanam&display=swap');

        :root {
            --primary-color: #0047AB; 
            --wood-frame: #4e342e;
            --paper-bg: #ffffff;
            --board-bg: #f5f5f5;
        }

        body { background: #dcdcdc; font-family: 'Pavanam', sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; }

        .whiteboard {
            background-color: var(--board-bg);
            width: 100%; max-width: 1100px; min-height: 95vh;
            border: 12px solid var(--wood-frame); border-radius: 8px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); padding: 25px;
            position: relative; box-sizing: border-box;
        }

        header { text-align: center; border-bottom: 2px solid #ddd; margin-bottom: 20px; padding-bottom: 10px; }
        header h1 { color: var(--primary-color); margin: 0; font-size: 1.5rem; }

        .content-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px; margin-bottom: 20px;
        }

        .paper-note {
            background: var(--paper-bg); padding: 20px;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.1); border-top: 5px solid var(--primary-color);
        }

        .full-width-note { grid-column: 1 / -1; }

        h3 { color: var(--primary-color); border-bottom: 1px solid #eee; padding-bottom: 5px; margin-top: 0; }
        
        /* STAFF TABLE AT TOP */
        .staff-table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        .staff-table th, .staff-table td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        .staff-table th { background: #f0f4f8; color: var(--primary-color); }

        /* SCOREBOARD */
        .scoreboard-container { display: flex; justify-content: space-around; flex-wrap: wrap; }
        .house-card {
            text-align: center; padding: 10px; border-radius: 8px; width: 100px; margin: 5px;
            background: #fff; border: 3px solid #ccc;
        }
        .house-குறிஞ்சி { border-color: #4CAF50; color: #4CAF50; }
        .house-முல்லை { border-color: #2196F3; color: #2196F3; }
        .house-மருதம் { border-color: #795548; color: #795548; }
        .house-நெய்தல் { border-color: #009688; color: #009688; }
        .house-பாலை { border-color: #FF9800; color: #FF9800; }
        .house-points { font-size: 1.8rem; font-weight: bold; color: #333; display: block; }

        /* POSTER - FULL WIDTH AND LARGE */
        .poster-container { text-align: center; width: 100%; }
        .poster-img { 
            width: 100%; height: auto; max-width: 900px; 
            margin-top: 15px; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* LINKS - SPACIOUS LAYOUT */
        .links-flex { 
            display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; padding: 15px 0;
        }
        .link-item { 
            background: #fdfdfd; padding: 12px 20px; border: 1px solid #ddd; border-radius: 30px;
            color: var(--primary-color); text-decoration: none; font-weight: bold;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.05); transition: 0.3s;
        }
        .link-item:hover { background: var(--primary-color); color: white; }
    </style>
</head>
<body>

<div class="whiteboard">
    <header>
        <h1>அண்ணா அரசு மாதிரி மேல்நிலைப் பள்ளி, பட்டீஸ்வரம்</h1>
        <h2>விளையாட்டுத் துறை (Sports Department)</h2>
    </header>

    <div id="staff-section" class="content-grid" style="display:none;">
        <div class="paper-note full-width-note">
            <h3>👥 பொறுப்பு ஆசிரியர்கள் (Staff in Charge)</h3>
            <table class="staff-table" id="staff-list">
                <tr><th>பெயர்</th><th>பதவி</th></tr>
            </table>
        </div>
    </div>

    <div class="content-grid">
        <div class="paper-note full-width-note" style="background-color: #fffdf0; border-top-color: #FFD700;">
            <h3 style="color: #b8860b; text-align: center;">🏆 இல்லங்களின் புள்ளிப்பட்டியல் (Live Scoreboard) 🏆</h3>
            <div id="scoreboard-container" class="scoreboard-container"></div>
        </div>
    </div>

    <div class="content-grid" id="main-board"></div>

    <div id="links-section" class="content-grid" style="display:none;">
        <div class="paper-note full-width-note">
            <h3>🔗 முக்கிய இணைப்புகள் (Important Links)</h3>
            <div id="link-list" class="links-flex"></div>
        </div>
    </div>
</div>

<script>
    const webContentURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTvUa-lafFet8lATvvxw5UIJwI0uQ4B_s2YCd9FyAycBRGjgx_iIDmcDSPx76Vbe-SQH0gvNhOFJcrO/pub?gid=0&single=true&output=csv";
    const scoreboardURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTvUa-lafFet8lATvvxw5UIJwI0uQ4B_s2YCd9FyAycBRGjgx_iIDmcDSPx76Vbe-SQH0gvNhOFJcrO/pub?gid=866796290&single=true&output=csv";

    function parseCSV(data) {
        return data.split(/\r?\n/).filter(row => row.trim() !== "").map(row => 
            row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(col => col.replace(/^"|"$/g, "").trim())
        );
    }

    // NCC Style Image Fix
    function getRobustImageUrl(url) {
        if (!url) return "";
        const idMatch = url.match(/[-\w]{25,}/);
        return idMatch ? `https://lh3.googleusercontent.com/d/${idMatch[0]}` : url;
    }

    async function loadScoreboard() {
        try {
            const res = await fetch(scoreboardURL);
            const rows = parseCSV(await res.text());
            const container = document.getElementById('scoreboard-container');
            container.innerHTML = '';
            rows.slice(1).forEach(cols => {
                if (!cols[0]) return;
                const name = cols[0].trim();
                const pts = cols[1] || "0";
                container.innerHTML += `<div class="house-card house-${name}"><h4 style="margin:0">${name}</h4><span class="house-points">${pts}</span><small>புள்ளிகள்</small></div>`;
            });
        } catch (e) { console.error(e); }
    }

    async function loadWebContent() {
        try {
            const res = await fetch(webContentURL);
            const rows = parseCSV(await res.text());
            const board = document.getElementById('main-board');
            board.innerHTML = '';

            rows.forEach(cols => {
                if (cols.length < 2 || !cols[0]) return;
                const category = cols[0].trim().toLowerCase();
                const content = cols[1].trim();
                const subtext = cols[2] ? cols[2].trim() : '';

                if (category === "staff") {
                    document.getElementById('staff-section').style.display = 'grid';
                    document.getElementById('staff-list').innerHTML += `<tr><td>${content}</td><td>${subtext}</td></tr>`;
                }
                else if (category === "poster") {
                    board.innerHTML += `<div class="paper-note full-width-note poster-container">
                        <h3>${content}</h3>
                        <img src="${getRobustImageUrl(subtext)}" class="poster-img" onerror="this.src='https://via.placeholder.com/800x400?text=Check+Drive+Permissions';">
                    </div>`;
                }
                else if (category === "link") {
                    document.getElementById('links-section').style.display = 'grid';
                    document.getElementById('link-list').innerHTML += `<a href="${subtext}" target="_blank" class="link-item">🌐 ${content}</a>`;
                }
                else if (["vision", "mission", "announcement"].includes(category)) {
                    const titles = {"vision": "நோக்கம்", "mission": "செயல்பாடுகள்", "announcement": "அறிவிப்பு"};
                    board.innerHTML += `<div class="paper-note"><h3>${titles[category]}</h3><p>${content}</p></div>`;
                }
            });
        } catch (e) { console.error(e); }
    }

    loadScoreboard();
    loadWebContent();
</script>

</body>
</html>
